name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/courtbook?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/courtbook?schema=public
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      PAYMENT_GATEWAY: mock
      MIDTRANS_IS_PRODUCTION: "false"
      DEMO_AUTH_ENABLED: "false"
      NEXT_PUBLIC_DEMO_AUTH_ENABLED: "false"
      DEMO_PAYMENT_CONFIRM_ENABLED: "false"
      NEXT_PUBLIC_DEMO_PAYMENT_CONFIRM_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
